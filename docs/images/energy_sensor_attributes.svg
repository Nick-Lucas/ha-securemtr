<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" role="img" aria-labelledby="title desc">
  <title id="title">SecureMTR energy sensor attributes example</title>
  <desc id="desc">Mock Home Assistant developer tools panel showing SecureMTR energy sensor attributes.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f9fbff" />
      <stop offset="100%" stop-color="#e3e9f7" />
    </linearGradient>
    <style>
      .card { fill: white; stroke: #d3d9e6; stroke-width: 1.5; rx: 12; }
      .heading { font: 700 30px 'Inter', 'Segoe UI', sans-serif; fill: #1b2a4b; }
      .label { font: 600 22px 'Inter', 'Segoe UI', sans-serif; fill: #273349; }
      .value { font: 400 22px 'Inter', 'Segoe UI', sans-serif; fill: #384861; }
      .chip { fill: #eef2fb; stroke: #c7d2f0; stroke-width: 1; rx: 18; }
      .chip-text { font: 600 20px 'Inter', 'Segoe UI', sans-serif; fill: #2f3d73; }
      .muted { font: 400 18px 'Inter', 'Segoe UI', sans-serif; fill: #5b6885; }
    </style>
  </defs>
  <rect x="0" y="0" width="960" height="540" fill="url(#bg)" />
  <rect x="120" y="60" width="720" height="420" class="card" />
  <text x="160" y="120" class="heading">Developer Tools → States</text>
  <text x="160" y="168" class="label">Entity ID</text>
  <text x="360" y="168" class="value">sensor.securemtr_primary_energy_kwh</text>
  <text x="160" y="208" class="label">State</text>
  <text x="360" y="208" class="value">42.81</text>
  <text x="540" y="208" class="value">kWh</text>
  <text x="160" y="252" class="label">Attributes</text>
  <rect x="160" y="270" width="240" height="48" class="chip" />
  <text x="180" y="300" class="chip-text">device_class: energy</text>
  <rect x="420" y="270" width="260" height="48" class="chip" />
  <text x="440" y="300" class="chip-text">state_class: total_increasing</text>
  <rect x="700" y="270" width="110" height="48" class="chip" />
  <text x="715" y="300" class="chip-text">unit: kWh</text>
  <text x="160" y="350" class="label">Last updated</text>
  <text x="360" y="350" class="value">2025-03-05T01:08:12+00:00</text>
  <text x="160" y="392" class="label">Device</text>
  <text x="360" y="392" class="value">SecureMTR Water Heater</text>
  <text x="160" y="434" class="muted">The SecureMTR integration keeps this total monotonically increasing even when the controller resets.</text>
</svg>
